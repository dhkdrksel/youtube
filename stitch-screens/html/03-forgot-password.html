<body class="bg-pitch-black text-on-surface font-body-md flex flex-col min-h-screen">
<!-- TopAppBar -->
<header class="bg-transparent docked full-width top-0 z-50">
<div class="flex justify-between items-center w-full px-margin-mobile md:px-margin-desktop py-md max-w-7xl mx-auto">
<div class="font-display-hero text-headline-lg text-primary tracking-tighter">AETHER AI</div>
<div class="flex items-center gap-md">
<button class="text-on-surface-variant hover:text-holographic-blue transition-colors Active: scale-95 transition-transform">
<span class="material-symbols-outlined">help_outline</span>
</button>
</div>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex items-center justify-center relative overflow-hidden px-margin-mobile">
<!-- Atmospheric Background Glows -->
<div class="absolute top-1/4 -left-1/4 w-[600px] h-[600px] bg-primary opacity-5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-1/4 -right-1/4 w-[600px] h-[600px] bg-holographic-blue opacity-5 rounded-full blur-[120px]"></div>
<!-- Centerpiece Reset Card -->
<div class="relative z-10 w-full max-w-[440px] bg-deep-slate p-xl rounded-xl shadow-2xl border border-surface-variant/50">
<div class="mb-lg">
<h1 class="font-headline-lg text-headline-md text-pure-white mb-xs">Reset Access</h1>
<p class="font-body-md text-[14px] text-silver-mist">Enter your network identifier to receive a reset cipher.</p>
</div>
<form action="#" class="space-y-lg" method="POST">
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-pure-white block font-semibold uppercase tracking-widest" for="email">EMAIL ADDRESS</label>
<input class="w-full bg-transparent border border-pure-white px-md py-sm text-pure-white font-body-md rounded-none stark-focus transition-all placeholder:text-surface-variant" id="email" name="email" placeholder="identity@network.aether" required="" type="email"/>
</div>
<div class="pt-sm">
<button class="w-full bg-primary-container text-pure-white py-md rounded-xl font-body-md font-bold hover:brightness-110 active:scale-[0.98] transition-all tracking-wide uppercase" type="submit">
                        RESET PASSWORD
                    </button>
</div>
</form>
<div class="mt-lg text-center">
<a class="font-body-md text-silver-mist hover:text-pure-white transition-colors flex items-center justify-center gap-xs" href="08-main-landing-page.html">
<span class="material-symbols-outlined text-[18px]">arrow_back</span>
                    Back to Login
                </a>
</div>
</div>
<!-- Decorative AI Visual Element -->
<div class="absolute bottom-10 left-10 hidden lg:block opacity-20 pointer-events-none">
<div class="w-64 h-64 border border-holographic-blue/30 rounded-full flex items-center justify-center animate-[spin_20s_linear_infinite]">
<div class="w-48 h-48 border-t-2 border-primary/40 rounded-full"></div>
</div>
</div>
</main>
<!-- Footer -->
<footer class="w-full py-lg px-margin-mobile md:px-margin-desktop flex flex-col md:flex-row justify-between items-center gap-md bg-pitch-black border-t border-surface-variant">
<div class="font-display-hero text-headline-md text-primary">AETHER AI</div>
<div class="flex flex-wrap justify-center gap-md">
<a class="font-body-md text-body-md text-silver-mist hover:text-pure-white transition-colors" href="#">Privacy Policy</a>
<a class="font-body-md text-body-md text-silver-mist hover:text-pure-white transition-colors" href="#">Terms of Service</a>
<a class="font-body-md text-body-md text-silver-mist hover:text-pure-white transition-colors" href="#">Contact Support</a>
</div>
<div class="font-body-md text-body-md text-silver-mist opacity-60">
            © 2024 AETHER AI. VISIONARY INTELLIGENCE.
        </div>
</footer>
<script>
        // Subtle interaction for the button
        const button = document.querySelector('button[type="submit"]');
        button.addEventListener('mousemove', (e) => {
            const rect = button.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            button.style.setProperty('--x', `${x}px`);
            button.style.setProperty('--y', `${y}px`);
        });

        // Simple floating animation for the card on mount
        window.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('.bg-deep-slate');
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            setTimeout(() => {
                card.style.transition = 'all 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body></html>
