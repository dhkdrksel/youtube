<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>

<title>Sign Up | AETHER AI</title>

            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }

            background-color: #000000;
            color: #ffffff;

        input:-webkit-autofill:hover,

            -webkit-text-fill-color: #ffffff;
            -webkit-box-shadow: 0 0 0px 1000px #000000 inset;
            transition: background-color 5000s ease-in-out 0s;
        }
        .glow-overlay {
            background: radial-gradient(circle at 50% 50%, rgba(227, 38, 82, 0.05) 0%, transparent 70%);
        }
    </style>

                      "tertiary-fixed": "#7df4ff",
                      "primary-container": "#e32652",
                      "on-primary-container": "#ffffff",
                      "on-error": "#690005",
                      "deep-slate": "#272c33",
                      "primary-fixed": "#ffdadb",
                      "pure-white": "#ffffff",
                      "on-primary-fixed-variant": "#91002c",
                      "secondary": "#ffffff",
                      "on-surface": "#e3e2e6",

<body class="bg-pitch-black min-h-screen flex flex-col items-center justify-center relative overflow-hidden px-margin-mobile md:px-margin-desktop">
<!-- Ambient Background Element -->
<div class="fixed inset-0 glow-overlay pointer-events-none z-0"></div>
<!-- Main Auth Canvas -->
<main class="w-full max-w-[440px] z-10 flex flex-col items-center">
<!-- Brand Identity -->
<header class="mb-lg text-center animate-fade-in">
<h1 class="font-headline-lg text-headline-lg text-pure-white tracking-[0.25em] uppercase mb-xs">
                AETHER AI
            </h1>
<p class="font-label-caps text-label-caps text-silver-mist tracking-[0.4em] uppercase">
                Initialize Protocol
            </p>
</header>
<!-- Auth Card -->
<div class="w-full bg-pitch-black/40 backdrop-blur-sm border border-pure-white/5 p-md md:p-lg flex flex-col gap-lg">
<form class="flex flex-col gap-md" onsubmit="event.preventDefault()">
<!-- Full Name Field -->
<div class="group flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-silver-mist uppercase">Legal Designation</label>
<input class="w-full bg-transparent border border-pure-white px-md py-sm font-body-md text-pure-white placeholder:text-silver-mist/30 focus:ring-1 focus:ring-holographic-blue focus:border-holographic-blue outline-none transition-all duration-300 rounded-none" placeholder="FULL NAME" type="text"/>
</div>
<!-- Email Field -->
<div class="group flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-silver-mist uppercase">Network Identifier</label>
<input class="w-full bg-transparent border border-pure-white px-md py-sm font-body-md text-pure-white placeholder:text-silver-mist/30 focus:ring-1 focus:ring-holographic-blue focus:border-holographic-blue outline-none transition-all duration-300 rounded-none" placeholder="EMAIL ADDRESS" type="email"/>
</div>
<!-- Password Field -->
<div class="group flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-silver-mist uppercase">Access Cipher</label>
<div class="relative">
<input class="w-full bg-transparent border border-pure-white px-md py-sm font-body-md text-pure-white placeholder:text-silver-mist/30 focus:ring-1 focus:ring-holographic-blue focus:border-holographic-blue outline-none transition-all duration-300 rounded-none" placeholder="SECURE PASSWORD" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-silver-mist hover:text-pure-white transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Primary CTA -->
<button class="w-full bg-primary-container text-on-primary-container font-headline-md text-[18px] py-sm rounded-xl mt-base hover:opacity-90 active:scale-[0.98] transition-all duration-200 tracking-wide uppercase">
                    Create Account
                </button>
</form>
<!-- Social/Alt Auth Separation -->
<div class="flex items-center gap-md">
<div class="h-[1px] flex-1 bg-white/10"></div>
<span class="font-label-caps text-label-caps text-silver-mist">OR CONNECT VIA</span>
<div class="h-[1px] flex-1 bg-white/10"></div>
</div>
<div class="grid grid-cols-2 gap-sm">
<button class="flex items-center justify-center gap-xs border border-white/20 py-xs hover:bg-white/5 transition-all text-pure-white font-label-caps text-label-caps uppercase">
<span class="material-symbols-outlined text-[18px]">terminal</span> GitHub
                </button>
<button class="flex items-center justify-center gap-xs border border-white/20 py-xs hover:bg-white/5 transition-all text-pure-white font-label-caps text-label-caps uppercase">
<span class="material-symbols-outlined text-[18px]">key</span> Google
                </button>
</div>
</div>
<!-- Footer Navigation -->
<footer class="mt-lg text-center">
<p class="font-body-md text-silver-mist">
                Already have an account? 
                <a class="text-pure-white font-bold ml-xs hover:text-holographic-blue transition-colors border-b border-transparent hover:border-holographic-blue pb-0.5" href="01-login.html">
                    Log In
                </a>
</p>
</footer>
</main>
<!-- Decorative Corner Accents -->
<div class="fixed top-gutter left-gutter w-12 h-12 border-t border-l border-white/10 pointer-events-none"></div>
<div class="fixed top-gutter right-gutter w-12 h-12 border-t border-r border-white/10 pointer-events-none"></div>
<div class="fixed bottom-gutter left-gutter w-12 h-12 border-b border-l border-white/10 pointer-events-none"></div>
<div class="fixed bottom-gutter right-gutter w-12 h-12 border-b border-r border-white/10 pointer-events-none"></div>
<!-- Data Stream Visual Effect (Subtle) -->
<div class="fixed inset-0 opacity-[0.03] pointer-events-none mix-blend-screen overflow-hidden">
<div class="absolute inset-0 bg-[linear-gradient(rgba(0,240,255,0.1)_1px,transparent_1px)] bg-[size:100%_40px] animate-pulse"></div>
</div>
<script>
        // Simple animation trigger for the entrance
        document.addEventListener('DOMContentLoaded', () => {
            const main = document.querySelector('main');
            main.style.opacity = '0';
            main.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                main.style.transition = 'all 1s cubic-bezier(0.16, 1, 0.3, 1)';
                main.style.opacity = '1';
                main.style.transform = 'translateY(0)';
            }, 100);
        });

        // Hover interaction for inputs to add subtle blue glow to background
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                document.querySelector('.glow-overlay').style.background = 'radial-gradient(circle at 50% 50%, rgba(0, 240, 255, 0.08) 0%, transparent 70%)';
            });
            input.addEventListener('blur', () => {
                document.querySelector('.glow-overlay').style.background = 'radial-gradient(circle at 50% 50%, rgba(227, 38, 82, 0.05) 0%, transparent 70%)';
            });
        });
    </script>
</body></html>
