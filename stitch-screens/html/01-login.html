<script>
        // Subtle micro-interaction for form inputs
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label').style.color = '#00f0ff';
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label').style.color = '#9ea0a9';
            });
        });

        // Background movement effect
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            const blurElements = document.querySelectorAll('.animate-pulse');
            blurElements.forEach(el => {
                el.style.transform = `translate(${x * 20}px, ${y * 20}px)`;
            });
        });
    </script>
